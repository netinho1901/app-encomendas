<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Aviso de Encomendas</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 20px auto; padding: 16px; background:#f5f5f5; }
    .card { background:white; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    input, textarea, button { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; }
    button { background:#25D366; color:white; border:none; cursor:pointer; font-weight:bold; }
    .cliente { display:flex; justify-content:space-between; align-items:center; background:#fafafa; padding:12px; border-radius:8px; margin-top:8px; }
    .cliente button { width:auto; padding:8px 14px; margin:0; }
  </style>
</head>
<body>
  <div class="card">
    <h2>App Aviso de Encomendas</h2>

    <input type="text" id="nome" placeholder="Nome do cliente" />
    <input type="text" id="telefone" placeholder="Telefone com DDD ex: 63999999999" />

    <textarea id="mensagem" rows="3">Olá, sua encomenda da Shopee chegou e está disponível para retirada no guichê da Real Expresso.</textarea>

    <button onclick="salvarCliente()">Cadastrar cliente</button>

    <input type="file" id="importarCSV" accept=".csv" onchange="importarCSV(event)" />

    <input type="text" id="buscar" placeholder="Buscar cliente" oninput="filtrarClientes()" />

    <h3>Clientes cadastrados</h3>
    <div id="listaClientes"></div>
  </div>

<script>
let clientes = JSON.parse(localStorage.getItem('clientes')) || [];

function salvarNoStorage(){
  localStorage.setItem('clientes', JSON.stringify(clientes));
}

function salvarCliente(){
  const nome = document.getElementById('nome').value.trim();
  const telefone = document.getElementById('telefone').value.trim();

  if(!nome || !telefone){
    alert('Preencha nome e telefone');
    return;
  }

  clientes.push({nome, telefone});
  salvarNoStorage();
  renderizarClientes();

  document.getElementById('nome').value='';
  document.getElementById('telefone').value='';
}

function enviarMensagem(cliente){
  const mensagemBase = document.getElementById('mensagem').value;
  const mensagem = `Olá ${cliente.nome}, ${mensagemBase.replace('Olá, ','')}`;
  const url = `https://wa.me/55${cliente.telefone}?text=${encodeURIComponent(mensagem)}`;
  window.location.href = url;
}

function excluirCliente(index){
  clientes.splice(index,1);
  salvarNoStorage();
  renderizarClientes();
}

function renderizarClientes(listaFiltrada = clientes){
  const lista = document.getElementById('listaClientes');
  lista.innerHTML='';

  listaFiltrada.forEach((cliente,index)=>{
    lista.innerHTML += `
      <div class="cliente">
        <div>
          <strong>${cliente.nome}</strong><br>
          ${cliente.telefone}
        </div>
        <div>
          <button onclick='enviarMensagem(${JSON.stringify(cliente)})'>Enviar</button>
          <button onclick='excluirCliente(${index})' style='background:#d9534f;'>Excluir</button>
        </div>
      </div>
    `;
  });
}

function filtrarClientes(){
  const termo = document.getElementById('buscar').value.toLowerCase();
  const filtrados = clientes.filter(cliente =>
    cliente.nome.toLowerCase().includes(termo) ||
    cliente.telefone.includes(termo)
  );
  renderizarClientes(filtrados);
}

function importarCSV(event){
  const arquivo = event.target.files[0];
  if(!arquivo) return;

  const reader = new FileReader();
  reader.onload = function(e){
    const linhas = e.target.result.split('
');

    linhas.forEach(linha => {
      const partes = linha.split(',');
      if(partes.length >= 2){
        const nome = partes[0].trim();
        const telefone = partes[1].trim();

        if(nome && telefone){
          clientes.push({nome, telefone});
        }
      }
    });

    salvarNoStorage();
    renderizarClientes();
    alert('Contatos importados com sucesso!');
  };

  reader.readAsText(arquivo);
}

renderizarClientes();
</script>
</body>
</html>
